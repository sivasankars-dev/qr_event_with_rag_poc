<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f8d7da;
            margin: 0;
        }
        .container {
            text-align: center;

            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);

        h1 {
            color: #721c24;
        }
        p {
            font-size: 1.2rem;
            margin-top: 0.5rem;
        }

<body>
    <div class="container">
        <h1>Oops! Something went wrong.</h1>
        <p>{{ error_message }}</p>
    </div>
</body>
</html>
